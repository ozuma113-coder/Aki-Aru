<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aki-Aru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #060608; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; padding-top: 70px; padding-bottom: 120px; width: 100%; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass { background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); }
        input, select, textarea { background: #18181b !important; border: 1px solid #3f3f46 !important; color: white !important; outline: none; -webkit-appearance: none; width: 100%; border-radius: 12px; padding: 12px; }
        .orange-btn { background: #ea580c; box-shadow: 0 4px 20px rgba(234, 88, 12, 0.4); border: none; transition: 0.2s; }
        .orange-btn:active { transform: scale(0.98); }
        .shop-card { background: #111114; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .tag { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .plan-card { border: 2px solid transparent; transition: all 0.2s; }
        #detail-modal { display: none; position: fixed; inset: 0; z-index: 100; background: #000; overflow-y: auto; }
        #detail-modal.active { display: block; }
        .upload-box { height: 160px; background: rgba(0,0,0,0.5); border: 2px dashed #27272a; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        button { border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ナビゲーション -->
    <nav class="fixed top-0 w-full z-50 bg-black/95 border-b border-white/5 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-2" onclick="showPage('landing')">
            <div class="w-8 h-8 bg-orange-600 rounded flex items-center justify-center font-black italic text-white text-sm">A</div>
            <span class="font-black italic text-xl tracking-tighter uppercase text-white">Aki-Aru</span>
        </div>
        <div class="text-[9px] font-bold text-zinc-600 italic uppercase tracking-widest">Live Preview</div>
    </nav>

    <!-- 1. トップ画面 -->
    <div id="page-landing" class="page active px-6">
        <div class="text-center pt-10 mb-12">
            <h1 class="text-6xl font-black italic mb-2 tracking-tighter text-white">Aki-Aru</h1>
        </div>
        <div class="space-y-6">
            <p class="text-[10px] font-black text-zinc-500 uppercase italic tracking-widest text-center">今の気分は？</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectPurpose('food')" class="h-48 bg-zinc-900 rounded-[40px] border border-white/10 flex flex-col items-center justify-center gap-4 active:scale-95 transition-transform text-white">
                    <i class="fas fa-utensils text-4xl text-orange-500"></i>
                    <span class="font-black italic text-lg uppercase">ご飯</span>
                </button>
                <button onclick="selectPurpose('drink')" class="h-48 bg-zinc-900 rounded-[40px] border border-white/10 flex flex-col items-center justify-center gap-4 active:scale-95 transition-transform text-white">
                    <i class="fas fa-glass-cheers text-4xl text-orange-500"></i>
                    <span class="font-black italic text-lg uppercase">飲み</span>
                </button>
            </div>
            <button onclick="showPage('owner-apply')" class="w-full py-5 bg-zinc-900/50 rounded-full font-black text-[10px] border border-white/5 uppercase tracking-widest text-zinc-500 mt-10 text-center">店舗掲載のご案内</button>
        </div>
    </div>

    <!-- カテゴリー選択 -->
    <div id="page-category-select" class="page px-6 text-white">
        <button onclick="showPage('landing')" class="mb-6 text-zinc-500 text-[10px] font-black uppercase bg-transparent text-left"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        <h2 id="purpose-title" class="text-4xl font-black italic mb-8 uppercase text-left">Categories</h2>
        <div id="category-list" class="grid grid-cols-1 gap-4"></div>
    </div>

    <!-- 2. プラン選択 -->
    <div id="page-owner-apply" class="page px-6 text-white text-left">
        <button onclick="showPage('landing')" class="mb-6 text-zinc-500 text-[10px] font-black uppercase bg-transparent text-left"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        <h2 class="text-3xl font-black italic mb-6 uppercase">Store Plans</h2>
        <div class="space-y-6 mb-10">
            <div class="plan-card bg-zinc-900 p-6 rounded-[30px] border border-white/10">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-orange-600 text-[9px] font-black px-3 py-1 rounded-full uppercase">Food Plan</span>
                    <p class="text-xl font-black italic text-right text-white">¥1,500<span class="text-[10px] text-zinc-500">/月</span></p>
                </div>
                <h3 class="font-black text-lg mb-2 text-white text-left">一般飲食店プラン</h3>
                <div class="flex gap-2">
                    <button onclick="confirmPlan('food', 1500, 'monthly')" class="flex-1 py-3 bg-white text-black rounded-xl text-[10px] font-black uppercase">月額</button>
                    <button onclick="confirmPlan('food', 15000, 'yearly')" class="flex-1 py-3 bg-orange-600 text-white rounded-xl text-[10px] font-black uppercase">年一括<br><span class="text-[7px]">2ヶ月お得</span></button>
                </div>
            </div>
            <div class="plan-card bg-zinc-900 p-6 rounded-[30px] border border-white/10">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-purple-600 text-[9px] font-black px-3 py-1 rounded-full uppercase">Drink Plan</span>
                    <p class="text-xl font-black italic text-right text-white">¥2,500<span class="text-[10px] text-zinc-500">/月</span></p>
                </div>
                <h3 class="font-black text-lg mb-2 text-white text-left">夜の飲食店プラン</h3>
                <div class="flex gap-2">
                    <button onclick="confirmPlan('drink', 2500, 'monthly')" class="flex-1 py-3 bg-white text-black rounded-xl text-[10px] font-black uppercase">月額</button>
                    <button onclick="confirmPlan('drink', 25000, 'yearly')" class="flex-1 py-3 bg-orange-600 text-white rounded-xl text-[10px] font-black uppercase">年一括<br><span class="text-[7px]">2ヶ月お得</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 申請フォーム -->
    <div id="page-owner-form" class="page px-6 text-white text-left">
        <button onclick="showPage('owner-apply')" class="mb-6 text-zinc-500 text-[10px] font-black uppercase bg-transparent text-left"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        <h2 class="text-3xl font-black italic mb-8 uppercase text-left">Verification</h2>
        <div class="bg-zinc-900 rounded-[40px] p-8 space-y-6 mb-10">
            <p id="selected-plan-text" class="text-orange-500 font-black text-xs italic uppercase"></p>
            <input type="text" id="reg-name" class="w-full font-bold" placeholder="正確な店舗名を入力">
            <div class="space-y-4">
                <p class="text-[9px] font-black text-zinc-500 uppercase italic px-2 text-left">① 営業許可証 (必須)</p>
                <label class="upload-box">
                    <i id="icon-license" class="fas fa-file-contract text-zinc-700 text-2xl mb-2"></i>
                    <span class="text-[9px] text-zinc-500 uppercase font-black">Tap to Upload</span>
                    <input type="file" accept="image/*" class="absolute inset-0 opacity-0" onchange="handleFileSelect(this, 'license')">
                    <img class="hidden absolute inset-0 w-full h-full object-cover" id="preview-license">
                </label>
            </div>
            <button onclick="submitApplication()" class="w-full py-6 orange-btn text-white rounded-full font-black text-xs uppercase shadow-2xl mt-4">支払いに進み、審査を申請</button>
        </div>
    </div>

    <!-- 店舗リスト -->
    <div id="page-user-list" class="page px-6 text-white">
        <div class="flex justify-between items-end mb-8 pt-5 text-left">
            <div>
                <p id="current-filter" class="text-orange-500 text-[10px] font-black uppercase tracking-widest italic mb-1">ALL</p>
                <h3 class="text-4xl font-black italic uppercase tracking-tighter">Nearby</h3>
            </div>
            <div class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center border border-white/10" onclick="showPage('landing')">
                <i class="fas fa-filter text-xs text-zinc-500"></i>
            </div>
        </div>
        <div id="shop-container" class="space-y-10"></div>
    </div>

    <!-- 管理画面 -->
    <div id="page-owner-main" class="page px-6 text-white text-left">
        <div class="flex justify-between items-center mb-8 pt-5">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">Admin</h2>
            <button onclick="showPage('owner-settings')" class="w-12 h-12 bg-zinc-900 rounded-full flex items-center justify-center border border-white/10 shadow-lg text-orange-500 bg-transparent">
                <i class="fas fa-cog"></i>
            </button>
        </div>
        <div class="bg-zinc-900 rounded-[50px] p-8 space-y-10 border border-white/5 shadow-2xl">
            <div class="grid grid-cols-3 gap-4">
                <button id="btn-ok" onclick="updateStatus('◯')" class="h-24 rounded-[30px] bg-green-500 text-black text-4xl font-black shadow-lg">◯</button>
                <button id="btn-few" onclick="updateStatus('△')" class="h-24 rounded-[30px] bg-zinc-800 text-zinc-600 text-4xl font-black">△</button>
                <button id="btn-full" onclick="updateStatus('✖︎')" class="h-24 rounded-[30px] bg-zinc-800 text-zinc-600 text-4xl font-black">✖︎</button>
            </div>
            <div class="space-y-4 text-center">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest italic">今の状況を一言で！</p>
                <textarea id="owner-shout-input" maxlength="60" class="w-full p-8 rounded-[40px] text-sm font-bold h-32" placeholder="例：カウンター席空いてます！"></textarea>
                <button onclick="saveOwnerUpdate()" id="update-btn" class="w-full py-6 orange-btn text-white rounded-full font-black text-sm uppercase shadow-2xl">反映する</button>
            </div>
        </div>
    </div>

    <!-- 設定画面 -->
    <div id="page-owner-settings" class="page px-6 text-white text-left">
        <button onclick="showPage('owner-main')" class="mb-6 text-zinc-500 text-[10px] font-black uppercase bg-transparent text-left"><i class="fas fa-arrow-left mr-2"></i> Adminに戻る</button>
        <h2 class="text-3xl font-black italic mb-8 uppercase text-left">Profile Setup</h2>
        <div class="bg-zinc-900 rounded-[40px] p-8 space-y-6 mb-10">
            <div class="space-y-2 text-center">
                <p class="text-[10px] font-black text-zinc-500 uppercase italic">店鋪メイン写真</p>
                <label class="h-48 bg-black rounded-3xl border border-white/10 flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                    <i id="photo-icon" class="fas fa-camera text-zinc-700 text-3xl"></i>
                    <input type="file" accept="image/*" class="absolute inset-0 opacity-0" onchange="handleFileSelect(this, 'main')">
                    <img id="preview-main" class="hidden absolute inset-0 w-full h-full object-cover">
                </label>
            </div>
            <input type="text" id="set-shop-name" class="font-bold" placeholder="店名">
            <select id="set-category" class="font-bold">
                <optgroup label="ご飯">
                    <option value="和食">和食</option>
                    <option value="イタリアン">イタリアン</option>
                    <option value="中華">中華</option>
                    <option value="ラーメン">ラーメン</option>
                </optgroup>
                <optgroup label="飲み">
                    <option value="居酒屋">居酒屋</option>
                    <option value="バー">バー</option>
                    <option value="スナック">スナック</option>
                </optgroup>
            </select>
            <input type="tel" id="set-tel" class="font-bold" placeholder="電話番号">
            <input type="text" id="set-address" class="font-bold" placeholder="住所">
            <button onclick="saveShopProfile()" class="w-full py-5 bg-white text-black rounded-full font-black text-xs uppercase mt-4">プロフィールを保存</button>
        </div>
    </div>

    <!-- モーダル -->
    <div id="detail-modal" class="text-white">
        <div id="modal-content"></div>
    </div>

    <!-- ボトムナビ -->
    <div id="bottom-nav" class="fixed bottom-0 w-full glass h-28 hidden flex items-center justify-around px-10 z-50">
        <button onclick="showPage('user-list')" id="nav-search" class="flex flex-col items-center gap-2 text-orange-600 bg-transparent">
            <i class="fas fa-search text-2xl"></i>
            <span class="text-[9px] font-black uppercase">Search</span>
        </button>
        <button onclick="showPage('owner-main')" id="nav-admin" class="flex flex-col items-center gap-2 text-zinc-600 bg-transparent">
            <i class="fas fa-store-alt text-2xl"></i>
            <span class="text-[9px] font-black uppercase">Admin</span>
        </button>
    </div>

    <script>
        // ブラウザ内データ管理（Firebaseを使わなくても動くようにする）
        let allShops = {
            'my-demo-shop': {
                id: 'my-demo-shop',
                name: "和食処 サンプル",
                category: "和食",
                status: "◯",
                shout: "本日限定の刺身あります！",
                tel: "03-0000-0000",
                address: "東京都渋谷区...",
                photo: ""
            }
        };
        let currentStatus = '◯';
        let shopPhotoData = '';

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + id);
            if(target) target.classList.add('active');
            
            const hideNav = ['landing', 'owner-apply', 'category-select', 'owner-form'].includes(id);
            document.getElementById('bottom-nav').classList.toggle('hidden', hideNav);
            
            if(!hideNav) {
                document.getElementById('nav-search').className = `flex flex-col items-center gap-2 bg-transparent ${id==='user-list' ? 'text-orange-600' : 'text-zinc-600'}`;
                document.getElementById('nav-admin').className = `flex flex-col items-center gap-2 bg-transparent ${id==='owner-main' ? 'text-orange-600' : 'text-zinc-600'}`;
            }
            closeModal();
            window.scrollTo(0,0);
        };

        window.selectPurpose = (purpose) => {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            const categories = {
                food: ['和食', 'イタリアン', '中華', 'ラーメン', 'カフェ'],
                drink: ['居酒屋', 'バー', 'スナック', 'バル']
            };
            categories[purpose].forEach(cat => {
                container.innerHTML += `<button onclick="selectCategory('${cat}')" class="w-full p-8 bg-zinc-900 rounded-[35px] border border-white/5 flex justify-between items-center text-white text-left font-black italic uppercase"><span>${cat}</span><i class="fas fa-chevron-right text-zinc-600"></i></button>`;
            });
            showPage('category-select');
        };

        window.selectCategory = (cat) => {
            document.getElementById('current-filter').innerText = cat;
            renderUserList(cat);
            showPage('user-list');
        };

        window.confirmPlan = (type, price, cycle) => {
            document.getElementById('selected-plan-text').innerText = `${type.toUpperCase()} PLAN [${cycle}] ¥${price.toLocaleString()}`;
            showPage('owner-form');
        };

        window.handleFileSelect = (input, type) => {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('preview-' + type);
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    if(type === 'main') {
                        shopPhotoData = e.target.result;
                        document.getElementById('photo-icon').classList.add('hidden');
                    } else {
                        document.getElementById('icon-' + type).classList.add('hidden');
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.submitApplication = () => {
            const name = document.getElementById('reg-name').value;
            if(!name) return alert("店舗名を入力してください");
            allShops['my-demo-shop'].name = name.toUpperCase();
            alert("審査申請完了！管理画面へ移動します");
            showPage('owner-main');
        };

        window.saveShopProfile = () => {
            const s = allShops['my-demo-shop'];
            s.name = document.getElementById('set-shop-name').value || s.name;
            s.category = document.getElementById('set-category').value;
            s.tel = document.getElementById('set-tel').value;
            s.address = document.getElementById('set-address').value;
            s.photo = shopPhotoData;
            alert("プロフィールを保存しました");
            showPage('owner-main');
        };

        window.updateStatus = (s) => {
            currentStatus = s;
            ['btn-ok', 'btn-few', 'btn-full'].forEach(id => {
                document.getElementById(id).className = 'h-24 rounded-[30px] bg-zinc-800 text-zinc-600 text-4xl font-black bg-transparent';
            });
            const colorClass = s === '◯' ? 'bg-green-500 text-black' : (s === '△' ? 'bg-orange-500 text-black' : 'bg-red-500 text-black');
            const targetId = s === '◯' ? 'btn-ok' : (s === '△' ? 'btn-few' : 'btn-full');
            document.getElementById(targetId).className = `h-24 rounded-[30px] ${colorClass} text-4xl font-black shadow-lg border-4 border-white/20`;
        };

        window.saveOwnerUpdate = () => {
            const shout = document.getElementById('owner-shout-input').value;
            allShops['my-demo-shop'].status = currentStatus;
            allShops['my-demo-shop'].shout = shout || "いらっしゃいませ！";
            
            const btn = document.getElementById('update-btn');
            btn.innerText = "SAVED!";
            setTimeout(() => {
                btn.innerText = "反映する";
                renderUserList();
                showPage('user-list');
            }, 800);
        };

        function renderUserList(catFilter) {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';
            Object.values(allShops).forEach(data => {
                if(catFilter && data.category !== catFilter) return;
                const colors = {'◯': 'bg-green-500', '△': 'bg-orange-500', '✖︎': 'bg-red-500'};
                container.innerHTML += `
                    <div class="shop-card rounded-[50px] overflow-hidden shadow-2xl active:scale-95 transition-transform text-left" onclick="openDetail('${data.id}')">
                        <div class="h-56 w-full bg-zinc-800 relative">
                            ${data.photo ? `<img src="${data.photo}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center opacity-10 font-black italic">Aki-Aru</div>'}
                            <div class="absolute top-6 right-6 w-14 h-14 rounded-full flex items-center justify-center font-black text-2xl text-black ${colors[data.status] || 'bg-zinc-700'} border-4 border-black/20 shadow-lg">${data.status}</div>
                            <div class="absolute bottom-6 left-6 flex gap-2"><span class="tag">${data.category}</span></div>
                        </div>
                        <div class="p-8">
                            <h4 class="text-3xl font-black italic uppercase tracking-tighter mb-2 text-white">${data.name}</h4>
                            <div class="text-[11px] font-bold text-zinc-500 truncate italic opacity-80">「${data.shout}」</div>
                        </div>
                    </div>`;
            });
        }

        window.openDetail = (id) => {
            const data = allShops[id];
            const colors = {'◯': 'bg-green-500', '△': 'bg-orange-500', '✖︎': 'bg-red-500'};
            document.getElementById('modal-content').innerHTML = `
                <div class="relative w-full h-80 bg-zinc-900">
                    <img src="${data.photo}" class="w-full h-full object-cover ${!data.photo ? 'hidden' : ''}">
                    <button onclick="closeModal()" class="absolute top-8 left-6 w-12 h-12 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-md text-white border-none"><i class="fas fa-times"></i></button>
                    <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end text-left">
                        <div>
                            <span class="tag mb-2 inline-block">${data.category}</span>
                            <h2 class="text-3xl font-black italic uppercase leading-none text-white">${data.name}</h2>
                        </div>
                        <div class="w-14 h-14 rounded-full flex items-center justify-center font-black text-2xl text-black ${colors[data.status] || 'bg-zinc-700'} border-4 border-black/30">${data.status}</div>
                    </div>
                </div>
                <div class="p-8 space-y-6 text-left">
                    <div class="bg-zinc-900 p-6 rounded-[30px] border border-white/5 italic font-bold text-center text-zinc-300">「${data.shout}」</div>
                    <div class="grid grid-cols-2 gap-4">
                        <a href="tel:${data.tel}" class="bg-white text-black py-5 rounded-[20px] flex flex-col items-center justify-center gap-2 no-underline font-bold"><i class="fas fa-phone-alt"></i><span class="text-[9px] font-black uppercase">Call</span></a>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.address)}" target="_blank" class="bg-zinc-900 text-white py-5 rounded-[20px] border border-white/10 flex flex-col items-center justify-center gap-2 no-underline font-bold"><i class="fas fa-map-marked-alt text-orange-500"></i><span class="text-[9px] font-black uppercase">Maps</span></a>
                    </div>
                </div>`;
            document.getElementById('detail-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('detail-modal').classList.remove('active');
            document.body.style.overflow = '';
        };

        // 起動
        renderUserList();
    </script>
</body>
</html>
